name: Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git checkout main
          git pull --ff-only origin main

      - name: Bump app version
        id: version
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          version_file = Path("version.properties")
          values = {}
          for raw_line in version_file.read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#"):
                  continue
              key, value = line.split("=", 1)
              values[key] = value

          version_code = int(values["VERSION_CODE"]) + 1
          major, minor, patch = (int(part) for part in values["VERSION_NAME"].split("."))
          version_name = f"{major}.{minor}.{patch + 1}"
          tag_name = f"v{version_name}"

          version_file.write_text(
              f"VERSION_CODE={version_code}\nVERSION_NAME={version_name}\n",
              encoding="utf-8",
          )

          output_file = Path(os.environ["GITHUB_OUTPUT"])
          with output_file.open("a", encoding="utf-8") as output:
              output.write(f"version_code={version_code}\n")
              output.write(f"version_name={version_name}\n")
              output.write(f"tag_name={tag_name}\n")
              output.write(f"asset_name=androidMDToDo-{tag_name}.apk\n")
          PY

      - name: Build release APK signed with debug key
        run: scripts/docker-gradle.sh assembleRelease

      - name: Stage release asset
        id: asset
        shell: bash
        run: |
          source_path="app/build/outputs/apk/release/app-release.apk"
          asset_dir="dist"
          asset_path="${asset_dir}/${{ steps.version.outputs.asset_name }}"

          if [[ ! -f "${source_path}" ]]; then
            echo "Expected signed APK at ${source_path}, but it was not produced." >&2
            exit 1
          fi

          mkdir -p "${asset_dir}"
          cp "${source_path}" "${asset_path}"
          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Commit version bump
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "chore: release v${VERSION_NAME} [skip release]"
          git push origin HEAD:main

      - name: Create and push tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.asset_name }}
          path: ${{ steps.asset.outputs.asset_path }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          ASSET_PATH: ${{ steps.asset.outputs.asset_path }}
        shell: bash
        run: |
          gh release create "${TAG_NAME}" "${ASSET_PATH}" \
            --title "${TAG_NAME}" \
            --generate-notes
